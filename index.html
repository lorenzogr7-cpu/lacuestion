<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LA CUESTIÓN">
    <meta name="mobile-web-app-capable" content="yes">
    <title>LA CUESTIÓN · terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'SF Mono', 'Courier New', 'Menlo', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s;
            touch-action: manipulation;
        }

        /* MODO PASTO OSCURO (SEGA) */
        body.grass-mode {
            background: #1a3a1a;
        }
        body.grass-mode .main-menu-terminal {
            background: repeating-linear-gradient(
                45deg,
                #2d5a2a 0px, #2d5a2a 6px,
                #3c6e34 6px, #3c6e34 12px,
                #4a7c3a 12px, #4a7c3a 18px
            ) !important;
            box-shadow: inset 0 0 0 1000px rgba(0,0,0,0.3);
            position: relative;
        }
        body.grass-mode .main-menu-terminal::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 30%, rgba(255,240,150,0.2) 2px, transparent 2px);
            background-size: 35px 35px;
            pointer-events: none;
        }
        body.grass-mode .main-menu-terminal h1,
        body.grass-mode .main-menu-terminal .option-terminal,
        body.grass-mode .main-menu-terminal .secret-phrase {
            color: #f9f7cf;
            text-shadow: 2px 2px 0 #0f2b0a;
        }
        body.grass-mode .main-menu-terminal .option-terminal {
            border-color: #e6c84f;
            background: rgba(0,0,0,0.5);
        }
        body.grass-mode .main-menu-terminal .option-terminal:hover {
            background: #e6c84f;
            color: #1f3b1a;
        }
        body.grass-mode .cascade-layer {
            background: rgba(20, 40, 10, 0.95);
            backdrop-filter: blur(3px);
        }
        body.grass-mode .cascade-content {
            background: #1f3b1a;
            border: 2px solid #e6c84f;
            color: #f9f7cf;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        body.grass-mode .cascade-content h2,
        body.grass-mode .cascade-content p,
        body.grass-mode .cascade-content .countdown,
        body.grass-mode .cascade-content .maps-link {
            color: #f9f7cf;
        }
        body.grass-mode .cascade-content button {
            background: #e6c84f;
            color: #1f3b1a;
            border: none;
        }
        body.grass-mode .cascade-content button:hover {
            background: #f5e29c;
        }
        body.grass-mode input {
            background: #0f2b0a;
            border-color: #e6c84f;
            color: #f9f7cf;
        }
        body.grass-mode .store-name-btn,
        body.grass-mode .wa-button {
            background: #e6c84f;
            color: #1f3b1a;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            transition: opacity 0.4s ease;
            overflow-y: auto;
            padding: 1rem;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* BOTÓN ANALÓGICO ANTIGUO */
        .light-switch {
            background: radial-gradient(circle at 35% 30%, #3a3a3a, #0f0f0f);
            width: 220px;
            height: 220px;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 -5px 0 #2a2a2a, inset 0 2px 4px rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s linear;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #555;
            text-shadow: 0 1px 1px black;
        }
        .light-switch:active {
            transform: scale(0.96);
            box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 0 -2px 0 #2a2a2a;
        }

        /* TERMINAL */
        .terminal-loader {
            background: #000;
            justify-content: flex-start;
            padding-top: 0.5rem;
        }
        .terminal-output {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            background: #000;
            color: #0f0;
            font-size: 0.8rem;
            line-height: 1.3;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            padding: 0.8rem;
            height: 70vh;
            overflow-y: auto;
        }
        .terminal-line {
            margin-bottom: 0.15rem;
            opacity: 0;
            animation: appear 0.02s forwards;
        }
        .terminal-line.highlight {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 3px #fff;
            background: rgba(255,255,255,0.1);
        }
        @keyframes appear {
            from { opacity: 0; transform: translateY(2px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-container {
            margin-top: 1rem;
            width: 80%;
            max-width: 400px;
            border: 1px solid #0f0;
            background: #000;
            padding: 2px;
        }
        .progress-bar {
            width: 0%;
            height: 20px;
            background: #0f0;
            transition: width 0.05s linear;
        }
        .progress-label {
            color: #0f0;
            font-family: monospace;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* POESÍA */
        .poem-screen {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.5;
        }
        .poem-text {
            max-width: 85%;
            white-space: pre-wrap;
            border-right: 2px solid #fff;
            padding: 1rem;
        }
        .entrar-btn {
            margin-top: 40px;
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            font-size: 1.2rem;
            font-family: monospace;
            padding: 10px 28px;
            cursor: pointer;
            transition: 0.2s;
        }
        .entrar-btn:hover {
            background: #fff;
            color: #000;
        }

        /* MENÚ PRINCIPAL - 9:16 CENTRADO EN ZONA SEGURA */
        .main-menu-terminal {
            background: #000 !important;
            font-family: monospace;
            width: 100%;
            min-height: -webkit-fill-available; /* for mobile */
            height: 100vh;
            height: -moz-available;
            height: stretch;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2vh 1rem;
        }
        .menu-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            gap: 2vh;   /* espacio uniforme entre elementos */
        }
        .main-menu-terminal h1 {
            font-family: 'Albert Sans', sans-serif;
            font-size: clamp(2rem, 8vh, 3.2rem);
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            margin: 0;
            border-bottom: 2px solid #fff;
            display: inline-block;
            padding-bottom: 0.3rem;
            text-align: center;
        }
        .options-terminal {
            display: flex;
            flex-direction: column;
            gap: 1.2vh;
            align-items: center;
            width: 100%;
            margin: 0;
        }
        .option-terminal {
            background: #000;
            border: 1px solid #fff;
            padding: 1.2vh 0.5rem;
            width: 100%;
            cursor: pointer;
            text-align: center;
        }
        .option-terminal h3 {
            font-size: clamp(0.9rem, 4vw, 1rem);
            font-weight: normal;
            margin: 0;
        }
        .secret-phrase {
            margin: 0;
            font-size: 0.7rem;
            font-style: italic;
            color: #aaa;
            text-align: center;
            cursor: pointer;
            max-width: 260px;
            line-height: 1.3;
        }

        /* Ajustes para orientación vertical (9:16 nativo) */
        @media (max-aspect-ratio: 1/1) and (orientation: portrait) {
            .main-menu-terminal {
                padding: 1vh 1rem;
            }
            .menu-content {
                gap: 1.5vh;
            }
            .main-menu-terminal h1 {
                font-size: 2rem;
            }
            .options-terminal {
                gap: 1vh;
            }
            .option-terminal {
                padding: 0.8vh 0.3rem;
            }
            .option-terminal h3 {
                font-size: 0.85rem;
            }
            .secret-phrase {
                font-size: 0.65rem;
            }
        }

        /* GLITCH */
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            pointer-events: none;
            animation: glitch-complex 1s steps(2, end) forwards;
        }
        @keyframes glitch-complex {
            0% { opacity: 0; background: transparent; transform: translate(0,0); }
            5% { opacity: 1; background: #000; }
            10% { background: #000; transform: translate(6px, -3px) skewX(3deg); }
            15% { transform: translate(-6px, 2px) skewX(-3deg); background: #f0f; mix-blend-mode: difference; }
            20% { transform: translate(10px, -2px) skewX(5deg); background: #0ff; }
            30% { transform: translate(-5px, 3px) skewX(-2deg); background: #000; }
            40% { transform: translate(5px, -1px) skewX(2deg); background: #fff; }
            50% { transform: translate(-2px, 1px) skewX(-1deg); background: #000; filter: blur(1px); }
            60% { transform: translate(2px, -2px) skewX(1deg); background: #f00; }
            70% { transform: translate(0,0); background: #000; filter: blur(0px); }
            100% { opacity: 0; visibility: hidden; }
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 2px, transparent 3px);
            pointer-events: none;
            z-index: 2001;
            animation: noiseFlicker 0.08s infinite;
        }
        @keyframes noiseFlicker {
            0% { opacity: 0.3; background-position: 0 0; }
            50% { opacity: 0.6; background-position: 10px 15px; }
            100% { opacity: 0.2; background-position: -5px -5px; }
        }

        /* MODALES */
        .cascade-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(1px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-family: monospace;
            text-align: center;
            flex-direction: column;
            animation: fadeIn 0.2s;
            cursor: pointer;
            padding: 1rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .cascade-content {
            background: #000;
            border: 1px solid #fff;
            padding: 1.5rem;
            max-width: 90%;
            width: 400px;
            cursor: default;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cascade-content h2 {
            font-size: 1.3rem;
        }
        .cascade-content button {
            background: #fff;
            border: none;
            padding: 8px 20px;
            font-size: 0.8rem;
            font-family: monospace;
            margin-top: 18px;
            cursor: pointer;
            color: #000;
        }
        .countdown {
            font-size: 1.1rem;
            margin: 0.5rem 0;
            color: #aaa;
        }
        .maps-link {
            font-size: 0.9rem;
        }
        input {
            background: #111;
            border: 1px solid #fff;
            padding: 8px;
            width: 80%;
            margin: 8px 0;
            font-size: 0.8rem;
        }
        .store-name-btn, .wa-button {
            font-size: 0.8rem;
            padding: 6px 12px;
        }
        .transfer-highlight {
            font-size: 1.2rem;
            padding: 0.4rem;
        }
        .copy-button {
            font-size: 0.65rem;
        }
        .alias-container {
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .alias-small {
            font-size: 0.7rem;
        }
        .fecha-grande {
            font-size: 1.8rem;
        }
        .comentario-bot {
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div id="lightScreen" class="screen">
    <div class="light-switch" id="lightSwitchBtn">> EL ÚLTIMO<br>QUE APAGUE LA LUZ</div>
</div>

<div id="loadingScreen" class="screen hidden terminal-loader">
    <div id="terminalOutput" class="terminal-output"></div>
    <div class="progress-container">
        <div id="progressBarFill" class="progress-bar"></div>
    </div>
    <div class="progress-label">CARGANDO LA CUESTIÓN</div>
</div>

<div id="poemScreen" class="screen hidden poem-screen">
    <div id="poemTextDisplay" class="poem-text"></div>
    <button id="entrarBtnFinal" class="entrar-btn hidden">> ENTRAR</button>
</div>

<div id="mainMenuScreen" class="screen hidden main-menu-terminal">
    <div class="menu-content">
        <h1 id="mainTitle">LA CUESTIÓN</h1>
        <div class="options-terminal">
            <div class="option-terminal" data-option="timeplace">
                <h3>HORA Y LUGAR</h3>
            </div>
            <div class="option-terminal" data-option="pista">
                <h3>UNA PISTA?</h3>
            </div>
            <div class="option-terminal" data-option="inscripcion">
                <h3>KIERO ESTAR EN LA CUESTIÓN</h3>
            </div>
        </div>
        <div id="secretPhrase" class="secret-phrase">
            "es momento de salir,<br>cuando llegue la promesa... ¿a ke abrazo vas a ir?"
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- MANIFEST PWA + FULLSCREEN ----------
        const manifestData = {
            name: "LA CUESTIÓN",
            short_name: "cuestión",
            start_url: ".",
            display: "fullscreen",
            theme_color: "#000000",
            background_color: "#000000",
            icons: []
        };
        const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: "application/json"});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);
        
        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }
        
        // Limpiar participantes
        localStorage.removeItem("cuestion_participantes");
        
        // ---------- AUDIO: BEAT 8-BITS 110 BPM ----------
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let beatInterval = null;
        let currentStep = 0;
        
        function initAudio() {
            if (!audioCtx && AudioContextClass) audioCtx = new AudioContextClass();
            return audioCtx;
        }
        
        function playKick(time) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = 100;
            gain.gain.setValueAtTime(0.35, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.12);
            osc.start(time);
            osc.stop(time + 0.12);
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, 2048, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 2048; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const noiseGain = audioCtx.createGain();
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noiseGain.gain.setValueAtTime(0.1, time);
            noiseGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.04);
            noise.start(time);
            noise.stop(time + 0.04);
        }
        
        function playSnare(time) {
            if (!audioCtx) return;
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, 2048, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 2048; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.2, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.08);
            noise.start(time);
            noise.stop(time + 0.08);
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = 180;
            oscGain.gain.setValueAtTime(0.08, time);
            oscGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.06);
            osc.start(time);
            osc.stop(time + 0.06);
        }
        
        function playHat(time) {
            if (!audioCtx) return;
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, 1024, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 1024; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 4000;
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.08, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.04);
            noise.start(time);
            noise.stop(time + 0.04);
        }
        
        function start8BitBeat() {
            if (!audioCtx) return;
            if (beatInterval) clearInterval(beatInterval);
            currentStep = 0;
            const stepTime = (60 / 110) / 4;
            beatInterval = setInterval(() => {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const now = audioCtx.currentTime;
                if (currentStep % 8 === 0) playKick(now);
                if (currentStep % 8 === 4) playSnare(now);
                if (currentStep % 2 === 0) playHat(now);
                currentStep = (currentStep + 1) % 16;
            }, stepTime * 1000);
        }
        
        function stopBeat() {
            if (beatInterval) clearInterval(beatInterval);
            currentStep = 0;
        }
        
        // Sonidos auxiliares
        function playBeep(freq=880, duration=0.05, type='sine') {
            if(!audioCtx) initAudio();
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.start();
            osc.stop(now + duration);
        }
        
        function playMysterious() {
            if(!audioCtx) initAudio();
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = 220;
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc.start();
            osc.stop(now + 0.5);
        }
        
        function playGlitchCrash() {
            if(!audioCtx) initAudio();
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, 4096, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 4096; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            noise.start(now);
            noise.stop(now + 0.3);
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
            oscGain.gain.setValueAtTime(0.4, now);
            oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
            osc.start(now);
            osc.stop(now + 0.25);
        }
        
        // ---------- GENERACIÓN DE CÓDIGO MÁS CORTA ----------
        const terminalDiv = document.getElementById('terminalOutput');
        const progressFill = document.getElementById('progressBarFill');
        
        const baseMessages = [
            "[SYSTEM] booting...", "[INFO] load deps", "> adb devices", "emulator-5554   device",
            "[WARN] untrusted connection", "> curl -X POST https://api.cuestion.xyz/init", "HTTP/1.1 200 OK",
            "> process inject", ">> memory 0x7FFF2C", "[!] unknown: cuestion_daemon", "> cat /etc/cuestion.conf",
            "cipher = aes-256-gcm", "> sudo ./start_ritual.sh", "[+] ejecutando...", "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "> logcat -s CUESTION", "LA CUESTIÓN ESTÁ SUCEDIENDO", "[ERROR] sync fail, retry", "> ping cuestion.xyz",
            "64 bytes from 10.0.0.1", "LA CUESTIÓN ESTÁ SUCEDIENDO", "[CRITICAL] cannot stop", "> systemctl status cuestion",
            "● cuestion.service - active", "LA CUESTIÓN ESTÁ SUCEDIENDO", ">> inyección completada", "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "[ERROR] kernel panic", "> reiniciando...", "[SYSTEM] reboot --force", "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "[CRASH] dump complete", "LA CUESTIÓN ESTÁ SUCEDIENDO"
        ];
        
        let fullLog = [];
        for (let i = 0; i < 4; i++) fullLog.push(...baseMessages);
        for (let i = 0; i < 40; i++) {
            const r = Math.random();
            if (r < 0.4) fullLog.push(`[${Math.floor(Math.random()*999)}] LA CUESTIÓN ESTÁ SUCEDIENDO`);
            else if (r < 0.7) fullLog.push(`[ERROR] código ${Math.floor(Math.random()*300)}`);
            else fullLog.push(`> ${Math.random().toString(36).substring(5)}`);
        }
        for (let i = fullLog.length - 1; i > 0; i--) {
            if (Math.random() > 0.8) {
                const j = Math.floor(Math.random() * (i + 1));
                [fullLog[i], fullLog[j]] = [fullLog[j], fullLog[i]];
            }
        }
        
        let currentLine = 0;
        let loadingInterval = null;
        
        function startTerminalLoading(onComplete) {
            terminalDiv.innerHTML = '';
            currentLine = 0;
            const totalLines = fullLog.length;
            function addLine() {
                if (currentLine < totalLines) {
                    const lineText = fullLog[currentLine];
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'terminal-line';
                    if (lineText.toUpperCase().includes("LA CUESTIÓN ESTÁ SUCEDIENDO")) lineDiv.classList.add('highlight');
                    lineDiv.textContent = lineText;
                    terminalDiv.appendChild(lineDiv);
                    terminalDiv.scrollTop = terminalDiv.scrollHeight;
                    currentLine++;
                    const progress = (currentLine / totalLines) * 100;
                    progressFill.style.width = progress + '%';
                    if (lineText.includes("[ERROR]") || lineText.includes("[CRITICAL]") || lineText.includes("[CRASH]")) {
                        if (audioCtx && Math.random() > 0.7) playBeep(120, 0.05, 'square');
                    } else if (audioCtx && Math.random() > 0.85) playBeep(1800, 0.008, 'sine');
                    const delay = 8 + Math.random() * 18;
                    loadingInterval = setTimeout(addLine, delay);
                } else {
                    clearTimeout(loadingInterval);
                    progressFill.style.width = '100%';
                    playBeep(440, 0.2, 'sine');
                    setTimeout(() => onComplete && onComplete(), 150);
                }
            }
            addLine();
        }
        
        // ---------- POESÍA ----------
        const rawPoem = `y al final, 
un poco más tarde ke ahora,
cuando estés volviendo a tu casa,
mirarte y decir:
hoy fue para mi.
hoy, a este mundo,
le robé una noche.`;
        const poemLines = rawPoem.split('\n');
        let currentLineIndex = 0, currentCharIndex = 0, poemTimeout = null;
        const poemDiv = document.getElementById('poemTextDisplay');
        const entrarBtn = document.getElementById('entrarBtnFinal');
        let pausaExtraHecha = false;
        
        function startTypewriterPoem() {
            poemDiv.innerHTML = '';
            currentLineIndex = 0; currentCharIndex = 0; pausaExtraHecha = false;
            if (poemTimeout) clearTimeout(poemTimeout);
            typeNextLine();
        }
        
        function typeNextLine() {
            if (currentLineIndex >= poemLines.length) {
                setTimeout(() => { entrarBtn.classList.remove('hidden'); playMysterious(); }, 500);
                return;
            }
            const line = poemLines[currentLineIndex];
            if (line === "") { poemDiv.innerHTML += "<br><br>"; currentLineIndex++; poemTimeout = setTimeout(typeNextLine, 900); return; }
            currentCharIndex = 0;
            function typeChar() {
                if (currentCharIndex < line.length) {
                    poemDiv.innerHTML += line.charAt(currentCharIndex);
                    currentCharIndex++;
                    if (audioCtx && Math.random() > 0.7) playBeep(1200, 0.02, 'sine');
                    poemTimeout = setTimeout(typeChar, 80);
                } else {
                    poemDiv.innerHTML += "<br>";
                    currentLineIndex++;
                    let pausa = 1000;
                    if (!pausaExtraHecha && line.trim() === "y al final,") { pausaExtraHecha = true; pausa = 1800; }
                    poemTimeout = setTimeout(typeNextLine, pausa);
                }
            }
            typeChar();
        }
        
        // ---------- FLUJO PRINCIPAL ----------
        const lightScreen = document.getElementById('lightScreen');
        const lightBtn = document.getElementById('lightSwitchBtn');
        const loadingScreenElem = document.getElementById('loadingScreen');
        const poemScreenElem = document.getElementById('poemScreen');
        const mainMenuScreenElem = document.getElementById('mainMenuScreen');
        
        lightBtn.addEventListener('click', async (e) => {
            requestFullscreen();
            if(audioCtx && audioCtx.state !== 'running') await audioCtx.resume();
            playBeep(300, 0.1, 'triangle');
            lightScreen.classList.add('hidden');
            loadingScreenElem.classList.remove('hidden');
            startTerminalLoading(() => {
                loadingScreenElem.classList.add('hidden');
                const blackLayer = document.createElement('div');
                blackLayer.style.position = 'fixed';
                blackLayer.style.top = '0';
                blackLayer.style.left = '0';
                blackLayer.style.width = '100%';
                blackLayer.style.height = '100%';
                blackLayer.style.backgroundColor = '#000';
                blackLayer.style.zIndex = '500';
                blackLayer.style.opacity = '1';
                document.body.appendChild(blackLayer);
                setTimeout(() => {
                    blackLayer.remove();
                    poemScreenElem.classList.remove('hidden');
                    startTypewriterPoem();
                }, 1800);
            });
        });
        
        entrarBtn.addEventListener('click', () => {
            poemScreenElem.classList.add('hidden');
            playGlitchCrash();
            const glitchDiv = document.createElement('div'); glitchDiv.className = 'glitch-overlay'; document.body.appendChild(glitchDiv);
            const noiseDiv = document.createElement('div'); noiseDiv.className = 'noise-overlay'; document.body.appendChild(noiseDiv);
            const flashInterval = setInterval(() => {
                const flash = document.createElement('div');
                flash.style.position = 'fixed'; flash.style.top = '0'; flash.style.left = '0'; flash.style.width = '100%'; flash.style.height = '100%';
                flash.style.backgroundColor = 'white'; flash.style.pointerEvents = 'none'; flash.style.zIndex = '2002'; flash.style.opacity = '0.25';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 80);
            }, 100);
            setTimeout(() => clearInterval(flashInterval), 900);
            setTimeout(() => {
                glitchDiv.remove(); noiseDiv.remove();
                document.body.classList.add('grass-mode');
                mainMenuScreenElem.classList.remove('hidden');
                if (audioCtx && audioCtx.state === 'running') start8BitBeat();
                else if (audioCtx) audioCtx.resume().then(() => start8BitBeat());
            }, 1000);
        });
        
        // ---------- CAPAS EN CASCADA ----------
        function showCascade(step, finalCallback) {
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            const content = document.createElement('div');
            content.className = 'cascade-content';
            layer.appendChild(content);
            document.body.appendChild(layer);
            
            if (step === 0) {
                content.innerHTML = `<h2>UNA MÁS...</h2><button class="cascadeNext">[ CONTINUAR ]</button>`;
                const nextBtn = content.querySelector('.cascadeNext');
                nextBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playBeep(600, 0.1);
                    layer.remove();
                    showCascade(1, finalCallback);
                });
            } 
            else if (step === 1) {
                content.innerHTML = `<h2>YA CASI ESTAMOS...</h2><button class="cascadeNext">[ REVELAR ]</button>`;
                const nextBtn = content.querySelector('.cascadeNext');
                nextBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playBeep(700, 0.1);
                    layer.remove();
                    showCascade(2, finalCallback);
                });
            }
            else if (step === 2) {
                const targetDate = new Date(new Date().getFullYear(), 4, 9, 20, 0, 0);
                if (targetDate < new Date()) targetDate.setFullYear(new Date().getFullYear() + 1);
                function updateCountdown() {
                    const now = new Date();
                    const diff = targetDate - now;
                    if (diff <= 0) return "> EVENTO ACTIVO";
                    const days = Math.floor(diff / (1000*60*60*24));
                    const hours = Math.floor((diff % 86400000) / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    return `${days}d ${hours}h ${mins}m ${secs}s`;
                }
                content.innerHTML = `<div class="comentario-bot">felicitaciones, no sos un bot jajajaja</div>
                                    <div class="fecha-grande">09 DE MAYO - 20HS</div>
                                    <div class="countdown">${updateCountdown()}</div>
                                    <a class="maps-link" href="https://maps.app.goo.gl/PfAJwYZ6i2dsrbbTA" target="_blank">[ VER UBICACIÓN]</a>
                                    <br><button class="closeCascade">[ CERRAR ]</button>`;
                const countdownSpan = content.querySelector('.countdown');
                const intervalCd = setInterval(() => {
                    if (!document.body.contains(layer)) clearInterval(intervalCd);
                    else countdownSpan.innerText = updateCountdown();
                }, 1000);
                const closeBtn = content.querySelector('.closeCascade');
                closeBtn.addEventListener('click', () => {
                    clearInterval(intervalCd);
                    layer.remove();
                    if(finalCallback) finalCallback();
                });
            }
            layer.addEventListener('click', (e) => {
                if (e.target === layer && step === 2) {
                    const close = layer.querySelector('.closeCascade');
                    if (close) close.click();
                }
            });
        }
        
        function showPista() {
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            layer.innerHTML = `<div class="cascade-content">
                <div class="big-emoji">😰🌞</div>
                <p style="font-size:1.3rem; font-weight:bold;">adivinate esa</p>
                <button class="closePista">[ CERRAR ]</button>
            </div>`;
            document.body.appendChild(layer);
            layer.querySelector('.closePista').addEventListener('click', () => layer.remove());
        }
        
        function showInscripcion() {
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            layer.innerHTML = `<div class="cascade-content">
                <h2>KIERO ESTAR EN LA CUESTIÓN</h2>
                <div class="transfer-highlight">
                    1. TRANSFERIR <strong style="font-size:1.4rem;">$4.000</strong><br>
                    <div class="alias-container">
                        <span style="font-family:monospace;">alias: <code style="background:#000; padding:0.2rem 0.4rem;">ellorenzopa.banda</code></span>
                        <span class="alias-small">(Mafalda)</span>
                    </div>
                    <button id="copyAliasBtn" class="copy-button">[copiar alias]</button>
                    <span id="copyFeedback" class="copy-feedback"></span>
                </div>
                <p><strong>2. Dejar tu nombre:</strong></p>
                <input type="text" id="nombreParticipante" placeholder="nombre" autocomplete="off">
                <button id="guardarNombreBtn" class="store-name-btn">[ GUARDAR ]</button>
                <div id="feedbackNombre" style="font-size:0.7rem; margin-top:5px;"></div>
                <p><strong>3. NOS VEMOS AHI!</strong></p>
                <a id="whatsappLink" href="https://whatsapp.com/channel/0029VbBstkwAYlUR7b7wuI1j" target="_blank" class="wa-button">[ CANAL WHATSAPP ]</a>
                <button id="closeInscripcion" style="margin-top:20px;">[ CERRAR ]</button>
            </div>`;
            document.body.appendChild(layer);
            
            const copyBtn = layer.querySelector('#copyAliasBtn');
            const feedbackSpan = layer.querySelector('#copyFeedback');
            const aliasText = "ellorenzopa.banda";
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(aliasText).then(() => {
                    feedbackSpan.textContent = "✓ copiado";
                    setTimeout(() => feedbackSpan.textContent = "", 1200);
                    playBeep(880, 0.08);
                }).catch(() => {
                    feedbackSpan.textContent = "error";
                    setTimeout(() => feedbackSpan.textContent = "", 1200);
                });
            });
            
            const guardarBtn = layer.querySelector('#guardarNombreBtn');
            const nombreInput = layer.querySelector('#nombreParticipante');
            const feedback = layer.querySelector('#feedbackNombre');
            guardarBtn.addEventListener('click', () => {
                const nombre = nombreInput.value.trim();
                if(!nombre) { feedback.innerText = "> nombre requerido"; return; }
                let stored = localStorage.getItem("cuestion_participantes");
                let participantes = stored ? JSON.parse(stored) : [];
                participantes.push({nombre, fecha: new Date().toISOString()});
                localStorage.setItem("cuestion_participantes", JSON.stringify(participantes));
                feedback.innerHTML = "✓ guardado";
                nombreInput.disabled = true;
                guardarBtn.disabled = true;
                playBeep(660, 0.15);
            });
            layer.querySelector('#closeInscripcion').addEventListener('click', () => layer.remove());
        }
        
        // ---------- SECRETOS ----------
        let secretClickCount = 0, secretReset = null;
        const secretPhraseDiv = document.getElementById('secretPhrase');
        function showSecretMessage() {
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            layer.innerHTML = `<div class="cascade-content">
                <h2>🏆 PREMIO A LA CURIOSIDAD!!!</h2>
                <p style="font-size:1rem;">el cronograma va a estar en el baño</p>
                <p style="font-family:monospace; margin-top:0.5rem;">aaa y los emojis son un nombre</p>
                <button id="closeSecret">[ CERRAR ]</button>
            </div>`;
            document.body.appendChild(layer);
            layer.querySelector('#closeSecret').addEventListener('click', () => layer.remove());
        }
        secretPhraseDiv.addEventListener('click', () => {
            if (secretReset) clearTimeout(secretReset);
            secretClickCount++;
            playBeep(500, 0.04);
            if (secretClickCount === 3) {
                showSecretMessage();
                secretClickCount = 0;
            } else secretReset = setTimeout(() => secretClickCount = 0, 1000);
        });
        
        let clickCount = 0, resetTimeout = null;
        const mainTitle = document.getElementById('mainTitle');
        function showParticipantList() {
            const stored = localStorage.getItem("cuestion_participantes");
            let participantes = stored ? JSON.parse(stored) : [];
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            let html = `<div class="cascade-content"><h2>PARTICIPANTES REGISTRADOS</h2>`;
            if (!participantes.length) html += `<p>No hay nombres guardados aún.</p>`;
            else {
                html += `<div class="participant-list">`;
                participantes.forEach((p, idx) => {
                    html += `<div class="participant-item">${idx+1}. ${p.nombre} — ${new Date(p.fecha).toLocaleString()}</div>`;
                });
                html += `</div>`;
            }
            html += `<button id="closeParticipantList">[ CERRAR ]</button></div>`;
            layer.innerHTML = html;
            document.body.appendChild(layer);
            layer.querySelector('#closeParticipantList').addEventListener('click', () => layer.remove());
        }
        mainTitle.addEventListener('click', () => {
            if (resetTimeout) clearTimeout(resetTimeout);
            clickCount++;
            if (clickCount === 5) {
                showParticipantList();
                clickCount = 0;
            } else resetTimeout = setTimeout(() => clickCount = 0, 1000);
        });
        
        document.querySelectorAll('.option-terminal').forEach(opt => {
            opt.addEventListener('click', () => {
                const option = opt.dataset.option;
                if (option === 'timeplace') showCascade(0, null);
                else if (option === 'pista') showPista();
                else if (option === 'inscripcion') showInscripcion();
            });
        });
        
        document.body.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });
    })();
</script>
</body>
</html>
