<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LA CUESTIÓN · terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'SF Mono', 'Courier New', 'Menlo', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s;
        }

        /* MODO PASTO OSCURO (SEGA) */
        body.grass-mode {
            background: #1a3a1a;
        }
        body.grass-mode .main-menu-terminal {
            background: repeating-linear-gradient(
                45deg,
                #2d5a2a 0px, #2d5a2a 6px,
                #3c6e34 6px, #3c6e34 12px,
                #4a7c3a 12px, #4a7c3a 18px
            ) !important;
            box-shadow: inset 0 0 0 1000px rgba(0,0,0,0.3);
            position: relative;
        }
        body.grass-mode .main-menu-terminal::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 30%, rgba(255,240,150,0.2) 2px, transparent 2px);
            background-size: 35px 35px;
            pointer-events: none;
        }
        body.grass-mode .main-menu-terminal h1,
        body.grass-mode .main-menu-terminal .option-terminal,
        body.grass-mode .main-menu-terminal .secret-phrase {
            color: #f9f7cf;
            text-shadow: 2px 2px 0 #0f2b0a;
        }
        body.grass-mode .main-menu-terminal .option-terminal {
            border-color: #e6c84f;
            background: rgba(0,0,0,0.5);
        }
        body.grass-mode .main-menu-terminal .option-terminal:hover {
            background: #e6c84f;
            color: #1f3b1a;
        }
        body.grass-mode .cascade-layer {
            background: rgba(20, 40, 10, 0.95);
            backdrop-filter: blur(3px);
        }
        body.grass-mode .cascade-content {
            background: #1f3b1a;
            border: 2px solid #e6c84f;
            color: #f9f7cf;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        body.grass-mode .cascade-content h2,
        body.grass-mode .cascade-content p,
        body.grass-mode .cascade-content .countdown,
        body.grass-mode .cascade-content .maps-link {
            color: #f9f7cf;
        }
        body.grass-mode .cascade-content button {
            background: #e6c84f;
            color: #1f3b1a;
            border: none;
        }
        body.grass-mode .cascade-content button:hover {
            background: #f5e29c;
        }
        body.grass-mode input {
            background: #0f2b0a;
            border-color: #e6c84f;
            color: #f9f7cf;
        }
        body.grass-mode .store-name-btn,
        body.grass-mode .wa-button {
            background: #e6c84f;
            color: #1f3b1a;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            transition: opacity 0.4s ease;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* BOTÓN ANALÓGICO ANTIGUO (estilo vintage) */
        .light-switch {
            background: radial-gradient(circle at 35% 30%, #3a3a3a, #0f0f0f);
            width: 260px;
            height: 260px;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 -5px 0 #2a2a2a, inset 0 2px 4px rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s linear;
            text-align: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #555;
            text-shadow: 0 1px 1px black;
        }
        .light-switch:active {
            transform: scale(0.96);
            box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 0 -2px 0 #2a2a2a;
        }

        .terminal-loader {
            background: #000;
            justify-content: flex-start;
            padding-top: 1rem;
        }
        .terminal-output {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            background: #000;
            color: #0f0;
            font-size: 0.85rem;
            line-height: 1.4;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            padding: 1rem;
            height: 70vh;
            overflow-y: auto;
            scroll-behavior: auto;
        }
        .terminal-line {
            margin-bottom: 0.2rem;
            opacity: 0;
            animation: appear 0.03s forwards;
        }
        .terminal-line.highlight {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 3px #fff;
            background: rgba(255,255,255,0.1);
        }
        @keyframes appear {
            from { opacity: 0; transform: translateY(3px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-container {
            margin-top: 1.5rem;
            width: 80%;
            max-width: 500px;
            border: 1px solid #0f0;
            background: #000;
            padding: 2px;
        }
        .progress-bar {
            width: 0%;
            height: 24px;
            background: #0f0;
            transition: width 0.05s linear;
        }
        .progress-label {
            color: #0f0;
            font-family: monospace;
            margin-top: 0.5rem;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .poem-screen {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            text-align: center;
            line-height: 1.6;
        }
        .poem-text {
            max-width: 750px;
            white-space: pre-wrap;
            border-right: 2px solid #fff;
            padding: 1rem;
        }
        .entrar-btn {
            margin-top: 50px;
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            font-size: 1.2rem;
            font-family: monospace;
            padding: 10px 28px;
            cursor: pointer;
            transition: 0.2s;
        }
        .entrar-btn:hover {
            background: #fff;
            color: #000;
        }

        .main-menu-terminal {
            background: #000 !important;
            font-family: monospace;
            justify-content: center;
            transition: all 0.3s;
        }
        .main-menu-terminal h1 {
            font-family: 'Albert Sans', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #fff;
            margin-bottom: 3rem;
            border-bottom: 2px solid #fff;
            display: inline-block;
            padding-bottom: 0.5rem;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        .options-terminal {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }
        .option-terminal {
            background: #000;
            border: 1px solid #fff;
            padding: 0.8rem 1rem;
            width: 100%;
            cursor: pointer;
            transition: 0.15s linear;
            text-align: center;
        }
        .option-terminal:hover {
            background: #fff;
            color: #000;
        }
        .option-terminal h3 {
            font-size: 1rem;
            font-weight: normal;
            margin-bottom: 0.2rem;
        }
        .secret-phrase {
            margin-top: 3rem;
            font-size: 0.8rem;
            font-style: italic;
            color: #aaa;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            max-width: 280px;
            line-height: 1.4;
        }
        .secret-phrase:hover {
            color: #0f0;
        }

        /* EFECTO GLITCH MEJORADO */
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            pointer-events: none;
            animation: glitch-complex 1.2s steps(2, end) forwards;
        }
        @keyframes glitch-complex {
            0% { opacity: 0; background: transparent; }
            5% { opacity: 1; background: #000; box-shadow: 0 0 0 0 white; }
            10% { background: #000; transform: translate(8px, -4px) skewX(5deg); box-shadow: 0 0 20px 5px white; }
            15% { transform: translate(-8px, 3px) skewX(-5deg); background: #f0f; mix-blend-mode: difference; }
            20% { transform: translate(12px, -2px) skewX(8deg); background: #0ff; box-shadow: 0 0 30px 10px cyan; }
            25% { transform: translate(-12px, 5px) skewX(-8deg); background: #f00; }
            30% { transform: translate(5px, -5px) skewX(3deg); background: #000; box-shadow: 0 0 40px 15px white; }
            35% { transform: translate(-5px, 2px) skewX(-3deg); background: #fff; }
            40% { transform: translate(15px, -1px) skewX(10deg); background: #000; filter: blur(2px); }
            45% { transform: translate(-15px, 6px) skewX(-10deg); background: #0f0; }
            50% { transform: translate(0, 0) skewX(0); background: #000; filter: blur(0px); box-shadow: 0 0 0 0; }
            55% { transform: translate(6px, -3px) skewX(4deg); background: #fff; opacity: 0.9; }
            60% { transform: translate(-6px, 4px) skewX(-4deg); background: #000; filter: blur(1px); }
            70% { transform: translate(3px, -2px) skewX(2deg); background: #f0f; mix-blend-mode: normal; }
            80% { transform: translate(-3px, 1px) skewX(-2deg); background: #000; filter: blur(0px); }
            90% { transform: translate(0, 0); background: #000; opacity: 0.8; }
            100% { opacity: 0; visibility: hidden; background: transparent; }
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 2px, transparent 3px);
            pointer-events: none;
            z-index: 2001;
            animation: noiseFlicker 0.08s infinite;
        }
        @keyframes noiseFlicker {
            0% { opacity: 0.3; background-position: 0 0; }
            50% { opacity: 0.6; background-position: 10px 15px; }
            100% { opacity: 0.2; background-position: -5px -5px; }
        }

        .cascade-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(1px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-family: monospace;
            text-align: center;
            flex-direction: column;
            animation: fadeIn 0.2s;
            cursor: pointer;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .cascade-content {
            background: #000;
            border: 1px solid #fff;
            padding: 2rem;
            max-width: 90%;
            width: 450px;
            cursor: default;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cascade-content h2 {
            font-size: 1.4rem;
            font-weight: normal;
            margin-bottom: 1rem;
            font-family: monospace;
        }
        .cascade-content button {
            background: #fff;
            border: none;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-family: monospace;
            margin-top: 20px;
            cursor: pointer;
            color: #000;
        }
        .cascade-content button:hover {
            background: #ccc;
        }
        .countdown {
            font-size: 1.2rem;
            margin: 0.5rem 0 1rem 0;
            font-family: monospace;
            color: #aaa;
        }
        .maps-link {
            color: #fff;
            text-decoration: underline;
            display: inline-block;
            margin: 10px;
            font-size: 1rem;
        }
        input {
            background: #111;
            border: 1px solid #fff;
            padding: 10px;
            width: 80%;
            margin: 10px 0;
            color: #fff;
            font-family: monospace;
        }
        .store-name-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 6px 14px;
            cursor: pointer;
            font-family: monospace;
        }
        .wa-button {
            background: #075E54;
            color: #fff;
            padding: 8px 18px;
            text-decoration: none;
            display: inline-block;
            margin: 10px 0;
        }
        .participant-list {
            text-align: left;
            margin-top: 1rem;
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid #333;
            padding-top: 1rem;
        }
        .participant-item {
            font-family: monospace;
            font-size: 0.8rem;
            margin-bottom: 0.4rem;
            border-bottom: 1px dotted #333;
            padding-bottom: 0.2rem;
        }
        .big-emoji {
            font-size: 4rem;
            margin: 1rem;
            text-shadow: 0 0 10px #fff;
        }
        .transfer-highlight {
            font-size: 1.4rem;
            font-weight: bold;
            background: #222;
            padding: 0.5rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .transfer-highlight code {
            font-size: 1.3rem;
            background: #111;
            padding: 0.2rem 0.5rem;
        }
        .copy-button {
            background: transparent;
            border: none;
            color: #0f0;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.7rem;
            margin-left: 6px;
            text-decoration: underline;
            padding: 0;
        }
        .copy-button:hover {
            color: #fff;
        }
        .copy-feedback {
            font-size: 0.65rem;
            margin-left: 6px;
            color: #0f0;
        }
        /* Contenedor para que (Mafalda) quede al lado y no abajo */
        .alias-container {
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .alias-small {
            font-size: 0.75rem;
            color: #ccc;
            font-style: italic;
            margin-left: 0;
        }
        .fecha-grande {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        .comentario-bot {
            font-size: 0.8rem;
            font-style: italic;
            color: #aaa;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 650px) {
            .main-menu-terminal h1 { font-size: 2.5rem; }
            .poem-text { font-size: 1rem; }
            .terminal-output { font-size: 0.7rem; }
            .transfer-highlight { font-size: 1.1rem; }
            .big-emoji { font-size: 3rem; }
            .fecha-grande { font-size: 1.6rem; }
            .alias-container {
                white-space: normal;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div id="lightScreen" class="screen">
    <div class="light-switch" id="lightSwitchBtn">> EL ÚLTIMO<br>QUE APAGUE LA LUZ</div>
</div>

<div id="loadingScreen" class="screen hidden terminal-loader">
    <div id="terminalOutput" class="terminal-output"></div>
    <div class="progress-container">
        <div id="progressBarFill" class="progress-bar"></div>
    </div>
    <div class="progress-label">CARGANDO LA CUESTIÓN</div>
</div>

<div id="poemScreen" class="screen hidden poem-screen">
    <div id="poemTextDisplay" class="poem-text"></div>
    <button id="entrarBtnFinal" class="entrar-btn hidden">> ENTRAR</button>
</div>

<div id="mainMenuScreen" class="screen hidden main-menu-terminal">
    <h1 id="mainTitle">LA CUESTIÓN</h1>
    <div class="options-terminal">
        <div class="option-terminal" data-option="timeplace">
            <h3>HORA Y LUGAR</h3>
            <p></p>
        </div>
        <div class="option-terminal" data-option="pista">
            <h3>UNA PISTA?</h3>
            <p></p>
        </div>
        <div class="option-terminal" data-option="inscripcion">
            <h3>KIERO ESTAR EN LA CUESTIÓN</h3>
            <p></p>
        </div>
    </div>
    <div id="secretPhrase" class="secret-phrase">
        "es momento de salir,<br>cuando llegue la promesa... ¿a ke abrazo vas a ir?"
    </div>
</div>

<script>
    (function(){
        // ---------- LIMPIAR PARTICIPANTES AL INICIO ----------
        localStorage.removeItem("cuestion_participantes");
        
        // ---------- AUDIO: BEAT 8-BITS INDIE a 110 BPM ----------
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let beatInterval = null;
        let currentStep = 0;
        
        function initAudio() {
            if (!audioCtx && AudioContextClass) {
                audioCtx = new AudioContextClass();
            }
            return audioCtx;
        }
        
        function playKick(time) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = 100;
            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.15);
            osc.start(time);
            osc.stop(time + 0.15);
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, 4096, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 4096; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const noiseGain = audioCtx.createGain();
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noiseGain.gain.setValueAtTime(0.15, time);
            noiseGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
            noise.start(time);
            noise.stop(time + 0.05);
        }
        
        function playSnare(time) {
            if (!audioCtx) return;
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, 4096, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 4096; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.25, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.1);
            noise.start(time);
            noise.stop(time + 0.1);
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = 180;
            oscGain.gain.setValueAtTime(0.1, time);
            oscGain.gain.exponentialRampToValueAtTime(0.0001, time + 0.08);
            osc.start(time);
            osc.stop(time + 0.08);
        }
        
        function playHat(time) {
            if (!audioCtx) return;
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, 2048, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 2048; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 4000;
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.1, time);
            gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
            noise.start(time);
            noise.stop(time + 0.05);
        }
        
        function start8BitBeat() {
            if (!audioCtx) return;
            if (beatInterval) clearInterval(beatInterval);
            currentStep = 0;
            const stepTime = (60 / 110) / 4;
            beatInterval = setInterval(() => {
                if (!audioCtx || audioCtx.state !== 'running') return;
                const now = audioCtx.currentTime;
                if (currentStep % 8 === 0) playKick(now);
                if (currentStep % 8 === 4) playSnare(now);
                if (currentStep % 2 === 0) playHat(now);
                currentStep = (currentStep + 1) % 16;
            }, stepTime * 1000);
        }
        
        function stopBeat() {
            if (beatInterval) {
                clearInterval(beatInterval);
                beatInterval = null;
            }
            currentStep = 0;
        }
        
        // Sonidos auxiliares
        function playBeep(freq=880, duration=0.06, type='sine') {
            if(!audioCtx) initAudio();
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.start();
            osc.stop(now + duration);
        }
        
        function playMysterious() {
            if(!audioCtx) initAudio();
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = 220;
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
            osc.start();
            osc.stop(now + 0.6);
        }
        
        function playGlitchCrash() {
            if(!audioCtx) initAudio();
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const noise = audioCtx.createBufferSource();
            const buffer = audioCtx.createBuffer(1, 8192, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < 8192; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const gain = audioCtx.createGain();
            noise.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            noise.start(now);
            noise.stop(now + 0.4);
            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.connect(oscGain);
            oscGain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
            oscGain.gain.setValueAtTime(0.4, now);
            oscGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
        
        // ---------- GENERACIÓN DE CÓDIGO FRENÉTICO (sin cambios) ----------
        const terminalDiv = document.getElementById('terminalOutput');
        const progressFill = document.getElementById('progressBarFill');
        
        const baseMessages = [
            "[SYSTEM] booting kernel...",
            "[INFO] loading dependencies",
            "> adb devices",
            "List of devices attached",
            "emulator-5554   device",
            "[WARN] untrusted connection detected",
            "> curl -X POST https://api.cuestion.xyz/init",
            "HTTP/1.1 200 OK",
            "> process inject",
            ">> memory address 0x7FFF2C",
            "[!] unknown process: cuestion_daemon",
            "> cat /etc/cuestion.conf",
            "cipher = aes-256-gcm",
            "status = pending",
            "> sudo ./start_ritual.sh",
            "[+] ejecutando protocolo...",
            "LA CUESTIÓN ESTÁ SUCEDIENDO",
            ":: decodificando mensaje ::" ,
            "> logcat -s CUESTION",
            "D/CUESTION: evento próximo",
            "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "> grep 'secreto' /var/log/syslog",
            "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "[ERROR] fallo al sincronizar, reintentando",
            "> ping cuestion.xyz",
            "64 bytes from 10.0.0.1: time=42ms",
            "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "[CRITICAL] no se puede detener el proceso",
            "> systemctl status cuestion",
            "● cuestion.service - loaded (activating)",
            "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "[NET] paquete inesperado :: origen desconocido",
            ">> inyección de código completada",
            "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "> chmod +x cuestion",
            "> ./cuestion --reveal",
            "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "[ERROR] kernel panic: unable to handle page fault",
            "> reiniciando proceso en 3...",
            "> reiniciando proceso en 2...",
            "> reiniciando proceso en 1...",
            "[SYSTEM] reboot --force",
            "LA CUESTIÓN ESTÁ SUCEDIENDO",
            "> dmesg | tail -20",
            "[CRASH] dump complete",
            "LA CUESTIÓN ESTÁ SUCEDIENDO"
        ];
        
        let fullLog = [];
        for (let i = 0; i < 8; i++) fullLog.push(...baseMessages);
        for (let i = 0; i < 80; i++) {
            const r = Math.random();
            if (r < 0.4) fullLog.push(`[${Math.floor(Math.random()*9999)}] LA CUESTIÓN ESTÁ SUCEDIENDO`);
            else if (r < 0.7) fullLog.push(`[ERROR] código ${Math.floor(Math.random()*500)} - fallo sector ${Math.floor(Math.random()*100)}`);
            else fullLog.push(`> ${Math.random().toString(36).substring(7)} --force`);
        }
        for (let i = fullLog.length - 1; i > 0; i--) {
            if (Math.random() > 0.8) {
                const j = Math.floor(Math.random() * (i + 1));
                [fullLog[i], fullLog[j]] = [fullLog[j], fullLog[i]];
            }
        }
        
        let currentLine = 0;
        let loadingInterval = null;
        
        function startTerminalLoading(onComplete) {
            terminalDiv.innerHTML = '';
            currentLine = 0;
            const totalLines = fullLog.length;
            function addLine() {
                if (currentLine < totalLines) {
                    const lineText = fullLog[currentLine];
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'terminal-line';
                    if (lineText.toUpperCase().includes("LA CUESTIÓN ESTÁ SUCEDIENDO")) {
                        lineDiv.classList.add('highlight');
                    }
                    lineDiv.textContent = lineText;
                    terminalDiv.appendChild(lineDiv);
                    terminalDiv.scrollTop = terminalDiv.scrollHeight;
                    currentLine++;
                    const progress = (currentLine / totalLines) * 100;
                    progressFill.style.width = progress + '%';
                    
                    if (lineText.includes("[ERROR]") || lineText.includes("[CRITICAL]") || lineText.includes("[CRASH]")) {
                        if (audioCtx && Math.random() > 0.7) playBeep(120, 0.08, 'square');
                    } else if (audioCtx && Math.random() > 0.85) {
                        playBeep(1800, 0.01, 'sine');
                    }
                    const delay = 10 + Math.random() * 30;
                    loadingInterval = setTimeout(addLine, delay);
                } else {
                    clearTimeout(loadingInterval);
                    progressFill.style.width = '100%';
                    playBeep(440, 0.3, 'sine');
                    setTimeout(() => { if (onComplete) onComplete(); }, 200);
                }
            }
            addLine();
        }
        
        // ---------- POESÍA ----------
        const rawPoem = `y al final, 
un poco más tarde ke ahora,
cuando estés volviendo a tu casa,
mirarte y decir:
hoy fue para mi.
hoy, a este mundo,
le robé una noche.`;
        const poemLines = rawPoem.split('\n');
        let currentLineIndex = 0;
        let currentCharIndex = 0;
        let poemTimeout = null;
        const poemDiv = document.getElementById('poemTextDisplay');
        const entrarBtn = document.getElementById('entrarBtnFinal');
        let pausaExtraHecha = false;
        
        function startTypewriterPoem() {
            poemDiv.innerHTML = '';
            currentLineIndex = 0;
            currentCharIndex = 0;
            pausaExtraHecha = false;
            if (poemTimeout) clearTimeout(poemTimeout);
            typeNextLine();
        }
        
        function typeNextLine() {
            if (currentLineIndex >= poemLines.length) {
                setTimeout(() => {
                    entrarBtn.classList.remove('hidden');
                    playMysterious();
                }, 600);
                return;
            }
            const line = poemLines[currentLineIndex];
            if (line === "") {
                poemDiv.innerHTML += "<br><br>";
                currentLineIndex++;
                poemTimeout = setTimeout(typeNextLine, 1000);
                return;
            }
            currentCharIndex = 0;
            function typeChar() {
                if (currentCharIndex < line.length) {
                    poemDiv.innerHTML += line.charAt(currentCharIndex);
                    currentCharIndex++;
                    if (audioCtx && Math.random() > 0.6) playBeep(1200, 0.03, 'sine');
                    poemTimeout = setTimeout(typeChar, 90);
                } else {
                    poemDiv.innerHTML += "<br>";
                    currentLineIndex++;
                    let pausa = 1200;
                    if (!pausaExtraHecha && line.trim() === "y al final,") {
                        pausaExtraHecha = true;
                        pausa = 2000;
                    }
                    poemTimeout = setTimeout(typeNextLine, pausa);
                }
            }
            typeChar();
        }
        
        // ---------- FLUJO PRINCIPAL ----------
        const lightScreen = document.getElementById('lightScreen');
        const lightBtn = document.getElementById('lightSwitchBtn');
        const loadingScreenElem = document.getElementById('loadingScreen');
        const poemScreenElem = document.getElementById('poemScreen');
        const mainMenuScreenElem = document.getElementById('mainMenuScreen');
        
        lightBtn.addEventListener('click', async (e) => {
            if(audioCtx && audioCtx.state !== 'running') await audioCtx.resume();
            playBeep(300, 0.12, 'triangle');
            lightScreen.classList.add('hidden');
            loadingScreenElem.classList.remove('hidden');
            
            startTerminalLoading(() => {
                loadingScreenElem.classList.add('hidden');
                const blackLayer = document.createElement('div');
                blackLayer.style.position = 'fixed';
                blackLayer.style.top = '0';
                blackLayer.style.left = '0';
                blackLayer.style.width = '100%';
                blackLayer.style.height = '100%';
                blackLayer.style.backgroundColor = '#000';
                blackLayer.style.zIndex = '500';
                blackLayer.style.opacity = '1';
                document.body.appendChild(blackLayer);
                
                setTimeout(() => {
                    blackLayer.remove();
                    poemScreenElem.classList.remove('hidden');
                    startTypewriterPoem();
                }, 2000);
            });
        });
        
        // GLITCH MEJORADO AL HACER CLIC EN "ENTRAR"
        entrarBtn.addEventListener('click', () => {
            poemScreenElem.classList.add('hidden');
            
            playGlitchCrash();
            
            const glitchDiv = document.createElement('div');
            glitchDiv.className = 'glitch-overlay';
            document.body.appendChild(glitchDiv);
            
            const noiseDiv = document.createElement('div');
            noiseDiv.className = 'noise-overlay';
            document.body.appendChild(noiseDiv);
            
            const flashInterval = setInterval(() => {
                const flash = document.createElement('div');
                flash.style.position = 'fixed';
                flash.style.top = '0';
                flash.style.left = '0';
                flash.style.width = '100%';
                flash.style.height = '100%';
                flash.style.backgroundColor = 'white';
                flash.style.pointerEvents = 'none';
                flash.style.zIndex = '2002';
                flash.style.opacity = '0.3';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 100);
            }, 120);
            
            setTimeout(() => clearInterval(flashInterval), 1000);
            
            setTimeout(() => {
                glitchDiv.remove();
                noiseDiv.remove();
                document.body.classList.add('grass-mode');
                mainMenuScreenElem.classList.remove('hidden');
                
                if (audioCtx && audioCtx.state === 'running') {
                    start8BitBeat();
                } else if (audioCtx) {
                    audioCtx.resume().then(() => start8BitBeat());
                }
            }, 1200);
        });
        
        // ---------- CAPAS EN CASCADA ----------
        function showCascade(step, finalCallback) {
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            const content = document.createElement('div');
            content.className = 'cascade-content';
            layer.appendChild(content);
            document.body.appendChild(layer);
            
            if (step === 0) {
                content.innerHTML = `<h2>UNA MÁS...</h2><button class="cascadeNext">[ CONTINUAR ]</button>`;
                const nextBtn = content.querySelector('.cascadeNext');
                nextBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playBeep(600, 0.1);
                    layer.remove();
                    showCascade(1, finalCallback);
                });
            } 
            else if (step === 1) {
                content.innerHTML = `<h2>YA CASI ESTAMOS...</h2><button class="cascadeNext">[ REVELAR ]</button>`;
                const nextBtn = content.querySelector('.cascadeNext');
                nextBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playBeep(700, 0.1);
                    layer.remove();
                    showCascade(2, finalCallback);
                });
            }
            else if (step === 2) {
                const targetDate = new Date(new Date().getFullYear(), 4, 9, 20, 0, 0);
                if (targetDate < new Date()) targetDate.setFullYear(new Date().getFullYear() + 1);
                
                function updateCountdown() {
                    const now = new Date();
                    const diff = targetDate - now;
                    if (diff <= 0) return "> EVENTO ACTIVO";
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (86400000)) / (1000 * 60 * 60));
                    const mins = Math.floor((diff % (3600000)) / (1000 * 60));
                    const secs = Math.floor((diff % (60000)) / 1000);
                    return `${days}d ${hours}h ${mins}m ${secs}s`;
                }
                
                content.innerHTML = `<div class="comentario-bot">felicitaciones, no sos un bot jajajaja</div>
                                    <div class="fecha-grande">09 DE MAYO - 20HS</div>
                                    <div class="countdown">${updateCountdown()}</div>
                                    <a class="maps-link" href="https://maps.app.goo.gl/PfAJwYZ6i2dsrbbTA" target="_blank">[ VER UBICACIÓN]</a>
                                    <br><button class="closeCascade">[ CERRAR ]</button>`;
                const countdownSpan = content.querySelector('.countdown');
                const intervalCd = setInterval(() => {
                    if (!document.body.contains(layer)) clearInterval(intervalCd);
                    else countdownSpan.innerText = updateCountdown();
                }, 1000);
                const closeBtn = content.querySelector('.closeCascade');
                closeBtn.addEventListener('click', () => {
                    clearInterval(intervalCd);
                    layer.remove();
                    if(finalCallback) finalCallback();
                });
            }
            
            layer.addEventListener('click', (e) => {
                if (e.target === layer && step === 2) {
                    const closeBtn = layer.querySelector('.closeCascade');
                    if (closeBtn) closeBtn.click();
                }
            });
        }
        
        function showPista() {
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            layer.innerHTML = `<div class="cascade-content">
                <div class="big-emoji">😰🌞</div>
                <p style="font-size:1.5rem; font-weight:bold;">adivinate esa</p>
                <button class="closePista">[ CERRAR ]</button>
            </div>`;
            document.body.appendChild(layer);
            layer.querySelector('.closePista').addEventListener('click', () => layer.remove());
        }
        
        function showInscripcion() {
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            layer.innerHTML = `<div class="cascade-content">
                <h2>KIERO ESTAR EN LA CUESTIÓN</h2>
                <div class="transfer-highlight">
                    1. TRANSFERIR <strong style="font-size:1.6rem;">$4.000</strong><br>
                    <div class="alias-container">
                        <span style="font-family:monospace;">alias: <code style="background:#000; padding:0.2rem 0.5rem;">ellorenzopa.banda</code></span>
                        <span class="alias-small">(Mafalda)</span>
                    </div>
                    <button id="copyAliasBtn" class="copy-button">[copiar alias]</button>
                    <span id="copyFeedback" class="copy-feedback"></span>
                </div>
                <p><strong>2. Dejar tu nombre:</strong></p>
                <input type="text" id="nombreParticipante" placeholder="nombre" autocomplete="off">
                <button id="guardarNombreBtn" class="store-name-btn">[ GUARDAR ]</button>
                <div id="feedbackNombre" style="font-size:0.7rem; margin-top:5px;"></div>
                <p><strong>GENTE VIVA HACIENDO COSAS,NOS VEMOS AHI!</strong></p>
                <a id="whatsappLink" href="https://whatsapp.com/channel/0029VbBstkwAYlUR7b7wuI1j" target="_blank" class="wa-button">[ CANAL WHATSAPP ]</a>
                <button id="closeInscripcion" style="margin-top:20px;">[ CERRAR ]</button>
            </div>`;
            document.body.appendChild(layer);
            
            const copyBtn = layer.querySelector('#copyAliasBtn');
            const feedbackSpan = layer.querySelector('#copyFeedback');
            const aliasText = "ellorenzopa.banda";
            copyBtn.addEventListener('click', () => {
                navigator.clipboard.writeText(aliasText).then(() => {
                    feedbackSpan.textContent = "✓ copiado";
                    setTimeout(() => { feedbackSpan.textContent = ""; }, 1500);
                    playBeep(880, 0.1);
                }).catch(() => {
                    feedbackSpan.textContent = "error";
                    setTimeout(() => { feedbackSpan.textContent = ""; }, 1500);
                });
            });
            
            const guardarBtn = layer.querySelector('#guardarNombreBtn');
            const nombreInput = layer.querySelector('#nombreParticipante');
            const feedback = layer.querySelector('#feedbackNombre');
            guardarBtn.addEventListener('click', () => {
                const nombre = nombreInput.value.trim();
                if(nombre === "") {
                    feedback.innerText = "> nombre requerido";
                    return;
                }
                let stored = localStorage.getItem("cuestion_participantes");
                let participantes = stored ? JSON.parse(stored) : [];
                participantes.push({nombre: nombre, fecha: new Date().toISOString()});
                localStorage.setItem("cuestion_participantes", JSON.stringify(participantes));
                feedback.innerHTML = "✓ guardado";
                nombreInput.disabled = true;
                guardarBtn.disabled = true;
                playBeep(660, 0.2);
            });
            layer.querySelector('#closeInscripcion').addEventListener('click', () => layer.remove());
        }
        
        // ---------- SECRETOS ----------
        let secretClickCount = 0;
        let secretResetTimeout = null;
        const secretPhraseDiv = document.getElementById('secretPhrase');
        
        function showSecretMessage() {
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            layer.innerHTML = `<div class="cascade-content">
                <h2>🏆 PREMIO A LA CURIOSIDAD!!!</h2>
                <p style="font-size:1.2rem;">el cronograma va a estar en el baño</p>
                <p style="font-family:monospace; margin-top:1rem;">aaa y los emojis son un nombre</p>
                <button id="closeSecret">[ CERRAR ]</button>
            </div>`;
            document.body.appendChild(layer);
            layer.querySelector('#closeSecret').addEventListener('click', () => layer.remove());
        }
        
        secretPhraseDiv.addEventListener('click', () => {
            if (secretResetTimeout) clearTimeout(secretResetTimeout);
            secretClickCount++;
            playBeep(500, 0.05, 'sine');
            if (secretClickCount === 3) {
                showSecretMessage();
                secretClickCount = 0;
            } else {
                secretResetTimeout = setTimeout(() => { secretClickCount = 0; }, 1000);
            }
        });
        
        let clickCount = 0;
        let resetTimeout = null;
        const mainTitle = document.getElementById('mainTitle');
        function showParticipantList() {
            const stored = localStorage.getItem("cuestion_participantes");
            let participantes = stored ? JSON.parse(stored) : [];
            const existing = document.querySelector('.cascade-layer');
            if(existing) existing.remove();
            const layer = document.createElement('div');
            layer.className = 'cascade-layer';
            let contentHTML = `<div class="cascade-content">
                <h2>PARTICIPANTES REGISTRADOS</h2>`;
            if (participantes.length === 0) contentHTML += `<p>No hay nombres guardados aún.</p>`;
            else {
                contentHTML += `<div class="participant-list">`;
                participantes.forEach((p, idx) => {
                    contentHTML += `<div class="participant-item">${idx+1}. ${p.nombre} — ${new Date(p.fecha).toLocaleString()}</div>`;
                });
                contentHTML += `</div>`;
            }
            contentHTML += `<button id="closeParticipantList">[ CERRAR ]</button></div>`;
            layer.innerHTML = contentHTML;
            document.body.appendChild(layer);
            layer.querySelector('#closeParticipantList').addEventListener('click', () => layer.remove());
        }
        mainTitle.addEventListener('click', () => {
            if (resetTimeout) clearTimeout(resetTimeout);
            clickCount++;
            if (clickCount === 5) {
                showParticipantList();
                clickCount = 0;
            } else {
                resetTimeout = setTimeout(() => { clickCount = 0; }, 1000);
            }
        });
        
        document.querySelectorAll('.option-terminal').forEach(opt => {
            opt.addEventListener('click', () => {
                const option = opt.getAttribute('data-option');
                if(option === 'timeplace') showCascade(0, null);
                else if(option === 'pista') showPista();
                else if(option === 'inscripcion') showInscripcion();
            });
        });
        
        document.body.addEventListener('click', () => {
            if(audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });
    })();
</script>
</body>
</html>
