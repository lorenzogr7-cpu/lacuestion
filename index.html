<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LA CUESTIÓN · evento inmersivo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Evita selección de texto en botones, mejora inmersión */
        }

        body {
            background: #0a0f1e;
            font-family: 'Albert Sans', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        /* Pantallas principales */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0f1e;
            transition: opacity 0.5s ease;
            overflow-y: auto;
            padding: 2rem;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* ---- BOTÓN INTERRUPTOR ANALÓGICO (LUZ) ---- */
        .light-switch {
            background: radial-gradient(circle at 30% 20%, #f5e7d3, #d4b483);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: #2c2b26;
            text-shadow: 0 1px 1px white;
            border: 2px solid #ebc28e;
        }
        .light-switch:active {
            transform: scale(0.97);
            box-shadow: 0 8px 20px black;
        }

        /* overlay matrix + barra de carga */
        .matrix-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .matrix-active {
            opacity: 1;
            pointer-events: all;
        }
        canvas#matrixCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .loading-bar-container {
            position: relative;
            z-index: 2;
            width: 70%;
            max-width: 500px;
            background: #111;
            border: 2px solid #0f0;
            border-radius: 30px;
            padding: 3px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px #0f0;
        }
        .loading-bar {
            width: 0%;
            height: 30px;
            background: #0f0;
            border-radius: 30px;
            transition: width 0.08s linear;
            box-shadow: 0 0 8px #0f0;
        }
        .loading-text {
            position: relative;
            z-index: 2;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-shadow: 0 0 5px #0f0;
        }
        .matrix-message {
            position: relative;
            z-index: 2;
            color: #0f0;
            font-family: monospace;
            margin-top: 20px;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.7);
            padding: 8px 18px;
            border-radius: 40px;
        }

        /* pantalla de texto escribiendo */
        .typewriter-screen {
            background: black;
            color: #c0ffc0;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 1.6rem;
            padding: 2rem;
            text-align: center;
            line-height: 1.4;
        }
        .typewriter-text {
            max-width: 800px;
            border-right: 3px solid #0f0;
            white-space: pre-wrap;
            overflow: hidden;
        }
        .entrar-btn {
            margin-top: 40px;
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            font-size: 2rem;
            font-family: monospace;
            padding: 12px 32px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 60px;
            box-shadow: 0 0 10px #0f0;
        }
        .entrar-btn:hover {
            background: #0f0;
            color: black;
            transform: scale(1.05);
        }

        /* MENÚ PRINCIPAL */
        .main-menu {
            background: #0a0f1e;
            font-family: 'Albert Sans', sans-serif;
            text-align: center;
        }
        .main-menu h1 {
            font-size: 5rem;
            letter-spacing: 8px;
            color: #ffdd99;
            text-shadow: 0 0 15px #ffaa33;
            margin-bottom: 50px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        .option-card {
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(4px);
            border: 1px solid #ffdd99;
            border-radius: 32px;
            padding: 30px 25px;
            width: 260px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            color: #ffeca2;
        }
        .option-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border-color: #ffb347;
        }
        .option-card h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        .option-card p {
            font-size: 1rem;
            opacity: 0.8;
        }

        /* capas modales (para HORA Y LUGAR y demás) */
        .modal-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-family: 'Albert Sans', monospace;
            text-align: center;
            color: #f0e6a0;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-layer.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #11161f;
            padding: 2.5rem;
            border-radius: 48px;
            border: 1px solid gold;
            max-width: 90%;
            width: 450px;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        .close-modal {
            margin-top: 25px;
            background: none;
            border: 1px solid #ffdd99;
            color: #ffdd99;
            padding: 8px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
        }
        .countdown {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin: 25px 0;
            font-family: monospace;
        }
        .maps-link {
            display: inline-block;
            margin: 12px;
            color: #88ffaa;
            text-decoration: underline;
            word-break: break-all;
        }
        input {
            background: #1e2a2e;
            border: 1px solid #ffdd99;
            padding: 12px;
            width: 80%;
            margin: 15px 0;
            color: white;
            border-radius: 40px;
            font-size: 1rem;
        }
        .store-name-btn {
            background: #ffb347;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }
        .wa-button {
            background: #25D366;
            color: black;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            display: inline-block;
            text-decoration: none;
        }
        .emoji-big {
            font-size: 4rem;
        }
        hr {
            margin: 20px;
            border-color: #ffdd99;
        }
        @media (max-width: 700px) {
            .main-menu h1 { font-size: 3rem; }
            .option-card { width: 220px; padding: 20px; }
            .typewriter-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

<!-- Pantalla 0: botón de luz analógica -->
<div id="lightScreen" class="screen">
    <div class="light-switch" id="lightSwitchBtn">💡 EL ÚLTIMO<br>QUE APAGUE LA LUZ</div>
</div>

<!-- Overlay para lluvia Matrix + barra de carga -->
<div id="matrixOverlay" class="matrix-overlay">
    <canvas id="matrixCanvas"></canvas>
    <div class="loading-bar-container">
        <div id="loadingBar" class="loading-bar"></div>
    </div>
    <div class="loading-text">CARGANDO LA CUESTIÓN</div>
    <div class="matrix-message">⚡ la cuestión está sucediendo ⚡</div>
</div>

<!-- Pantalla de máquina de escribir (texto poético) -->
<div id="typewriterScreen" class="screen hidden typewriter-screen">
    <div id="typewriterText" class="typewriter-text"></div>
    <button id="entrarBtn" class="entrar-btn hidden">ENTRAR</button>
</div>

<!-- Menú principal -->
<div id="mainMenuScreen" class="screen hidden main-menu">
    <h1>LA CUESTIÓN</h1>
    <div class="options">
        <div class="option-card" data-option="timeplace">
            <h2>⏳ HORA Y LUGAR</h2>
            <p>Revela cuándo y dónde</p>
        </div>
        <div class="option-card" data-option="pista">
            <h2>🔍 UNA PISTAAA, ¿KIEN ES????</h2>
            <p>😰🌞</p>
        </div>
        <div class="option-card" data-option="inscripcion">
            <h2>✨ KIERO ESTAR EN LA CUESTIÓN</h2>
            <p>Instrucciones + entrada</p>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- SONIDOS CON WEB AUDIO ----------
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx && AudioContextClass) {
                audioCtx = new AudioContextClass();
            }
            return audioCtx;
        }

        // sonido corto "computadora" (beep simple)
        function playBeep(freq=880, duration=0.12, type='sine') {
            if(!audioCtx) initAudio();
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.start();
            osc.stop(now + duration);
        }

        // Sonido misterioso (bajo y reverberante)
        function playMysterious() {
            if(!audioCtx) initAudio();
            if(!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = 200;
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
            osc.start();
            osc.stop(now + 0.8);
            // un segundo armónico
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.value = 440;
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.1, now+0.05);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now+0.7);
            osc2.start(now+0.05);
            osc2.stop(now+0.75);
        }

        // sonido de "carga" repetitivo (tic rápido)
        let chargingInterval = null;
        function startChargingSound() {
            if (chargingInterval) clearInterval(chargingInterval);
            chargingInterval = setInterval(() => {
                if(!audioCtx) initAudio();
                if(audioCtx && audioCtx.state !== 'running') {
                    audioCtx.resume();
                }
                playBeep(880, 0.05, 'square');
            }, 180);
        }
        function stopChargingSound() {
            if (chargingInterval) {
                clearInterval(chargingInterval);
                chargingInterval = null;
            }
        }

        // ---------- FLUJO DE LA PÁGINA ----------
        const lightScreen = document.getElementById('lightScreen');
        const matrixOverlay = document.getElementById('matrixOverlay');
        const typewriterScreen = document.getElementById('typewriterScreen');
        const mainMenuScreen = document.getElementById('mainMenuScreen');
        const lightBtn = document.getElementById('lightSwitchBtn');
        const matrixCanvas = document.getElementById('matrixCanvas');
        const loadingBarDiv = document.getElementById('loadingBar');
        const typewriterContainer = document.getElementById('typewriterText');
        const entrarBtn = document.getElementById('entrarBtn');

        let matrixInterval = null;
        let animationId = null;
        let cargaCompleta = false;

        // ----- MATRIX EFFECT -----
        function startMatrixRain() {
            const canvas = matrixCanvas;
            const ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#%&?@*¡¿+~";
            const fontSize = 20;
            const columns = Math.floor(width / fontSize);
            const drops = Array(columns).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = "#0f0";
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = chars.charAt(Math.floor(Math.random() * chars.length));
                    const x = i * fontSize;
                    const y = drops[i] * fontSize;
                    ctx.fillText(text, x, y);
                    if (y > height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
                animationId = requestAnimationFrame(draw);
            }
            draw();

            window.addEventListener('resize', () => {
                if(!matrixOverlay.classList.contains('matrix-active')) return;
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                width = canvas.width;
                height = canvas.height;
                // reiniciar drops
                const newCols = Math.floor(width / fontSize);
                drops.length = newCols;
                for(let i=0;i<newCols;i++) drops[i] = Math.random() * height/fontSize;
            });
        }

        function stopMatrixRain() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            const canvas = matrixCanvas;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // barra de carga progresa hasta 100% en ~4 segundos
        function startLoadingBar(callback) {
            let widthPercent = 0;
            const interval = setInterval(() => {
                widthPercent += 2.5; // 40 pasos => 4seg aprox
                if (widthPercent >= 100) {
                    widthPercent = 100;
                    loadingBarDiv.style.width = '100%';
                    clearInterval(interval);
                    stopChargingSound();
                    playBeep(440, 0.3, 'sine');
                    if (callback) callback();
                } else {
                    loadingBarDiv.style.width = widthPercent + '%';
                }
            }, 100);
            return interval;
        }

        // ---- EVENTO PRINCIPAL: APAGAR LA LUZ ----
        lightBtn.addEventListener('click', async (e) => {
            // sonido de apagado: click DRY
            if(audioCtx && audioCtx.state !== 'running') await audioCtx.resume();
            playBeep(300, 0.1, 'triangle');
            // Ocultar pantalla de luz
            lightScreen.classList.add('hidden');
            // Mostrar matrix overlay
            matrixOverlay.classList.add('matrix-active');
            startMatrixRain();
            startChargingSound();
            // Iniciar barra de carga
            startLoadingBar(() => {
                // Finalizó la carga: se acaba la lluvia matrix
                stopMatrixRain();
                matrixOverlay.classList.remove('matrix-active');
                // Mostrar pantalla de máquina de escribir
                typewriterScreen.classList.remove('hidden');
                iniciarTypewriter();
            });
        });

        // ---- EFECTO MÁQUINA DE ESCRIBIR ----
        const fullText = `y al final, un poco más tarde que ahora, cuando estés volviendo a tu casa, mirarte y decir:\nhoy fue para mi. hoy, a este mundo, le robe una noche.`;
        let typingInterval = null;
        function iniciarTypewriter() {
            typewriterContainer.innerHTML = '';
            let index = 0;
            function typeNext() {
                if (index < fullText.length) {
                    typewriterContainer.innerHTML += fullText.charAt(index);
                    index++;
                    // sonido de tecla sutil
                    if (audioCtx && Math.random() > 0.7) playBeep(1200, 0.02, 'sine');
                    typingInterval = setTimeout(typeNext, 45);
                } else {
                    clearTimeout(typingInterval);
                    // Mostrar botón entrar después de 2 segundos
                    setTimeout(() => {
                        entrarBtn.classList.remove('hidden');
                        // Sonido misterioso al aparecer botón
                        if(audioCtx) playMysterious();
                    }, 2000);
                }
            }
            typeNext();
        }

        // Botón ENTRAR (con sonido)
        entrarBtn.addEventListener('click', () => {
            playMysterious();
            // Ocultar pantalla typewriter, mostrar menú principal
            typewriterScreen.classList.add('hidden');
            mainMenuScreen.classList.remove('hidden');
        });

        // ---------- LÓGICA DEL MENÚ PRINCIPAL ----------
        const optionCards = document.querySelectorAll('.option-card');
        
        // Función para crear capas modales dinámicas con historial de "UNA MÁS..."
        function showTimePlaceModal() {
            let step = 0;
            const modalLayer = document.createElement('div');
            modalLayer.className = 'modal-layer';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'modal-content';
            modalLayer.appendChild(contentDiv);
            document.body.appendChild(modalLayer);
            
            function updateContent() {
                if (step === 0) {
                    contentDiv.innerHTML = `<h2>UNA MÁS...</h2><button class="close-modal" id="nextStepBtn">↺ SEGUIR</button><br><button class="close-modal" id="closeNow">CERRAR</button>`;
                } else if (step === 1) {
                    contentDiv.innerHTML = `<h2>YA CASI ESTAMOS...</h2><button class="close-modal" id="nextStepBtn">⟳ REVELAR</button><br><button class="close-modal" id="closeNow">CERRAR</button>`;
                } else if (step === 2) {
                    // Mostrar información final con cuenta regresiva y maps
                    const targetDate = new Date(new Date().getFullYear(), 4, 9, 20, 0, 0); // 9 de Mayo 20hs
                    if (targetDate < new Date()) targetDate.setFullYear(new Date().getFullYear() + 1);
                    function updateCountdown() {
                        const now = new Date();
                        const diff = targetDate - now;
                        if (diff <= 0) return "¡COMENZÓ!";
                        const hours = Math.floor(diff / (1000*60*60));
                        const mins = Math.floor((diff % (3600000))/60000);
                        const secs = Math.floor((diff % 60000)/1000);
                        return `${hours}h ${mins}m ${secs}s`;
                    }
                    const countSpan = document.createElement('span');
                    countSpan.className = 'countdown';
                    const intervalCd = setInterval(() => {
                        if(!modalLayer.parentNode) clearInterval(intervalCd);
                        else countSpan.innerText = updateCountdown();
                    }, 1000);
                    contentDiv.innerHTML = `<h2>📍 09 de Mayo - 20HS</h2><div id="countdownDisplay"></div><a class="maps-link" href="https://maps.google.com/?q=Plaza+Mayor+Buenos+Aires" target="_blank">📌 Ver ubicación en Google Maps</a><br><button class="close-modal" id="closeNow">CERRAR</button>`;
                    const cdDiv = contentDiv.querySelector('#countdownDisplay');
                    if(cdDiv) cdDiv.appendChild(countSpan);
                    countSpan.innerText = updateCountdown();
                    const closeBtn2 = contentDiv.querySelector('#closeNow');
                    closeBtn2.addEventListener('click', () => {
                        clearInterval(intervalCd);
                        modalLayer.remove();
                    });
                    return;
                }
                const nextBtn = contentDiv.querySelector('#nextStepBtn');
                const closeBtn = contentDiv.querySelector('#closeNow');
                if(nextBtn) nextBtn.addEventListener('click', () => { step++; updateContent(); });
                if(closeBtn) closeBtn.addEventListener('click', () => modalLayer.remove());
            }
            updateContent();
            modalLayer.classList.add('active');
        }

        // PISTA: revela 😰🌞
        function showPistaModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-layer';
            modal.innerHTML = `<div class="modal-content"><div class="emoji-big">😰🌞</div><p style="font-size:2rem;">🌊 EL QUE BRILLA... 🎭</p><button class="close-modal">CERRAR</button></div>`;
            document.body.appendChild(modal);
            modal.classList.add('active');
            modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
        }

        // INSCRIPCIÓN: almacenar nombre y mostrar instrucciones + botón WhatsApp
        function showInscripcionModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-layer';
            modal.innerHTML = `<div class="modal-content">
                <h2>✨ KIERO ESTAR EN LA CUESTIÓN ✨</h2>
                <p><strong>1.</strong> Transferir <strong>$4.000</strong> a alias: <code style="background:#2c2c2c;padding:4px;">ellorenzopa.banda</code></p>
                <p><strong>2.</strong> Dejar tu nombre abajo (se almacenará en tu dispositivo)</p>
                <input type="text" id="nombreParticipante" placeholder="Tu nombre artístico / real" autocomplete="off">
                <button id="guardarNombreBtn" class="store-name-btn">💾 GUARDAR NOMBRE</button>
                <div id="feedbackNombre" style="font-size:0.8rem;"></div>
                <p><strong>3.</strong> NOS VEMOS AHI!</p>
                <a id="whatsappLink" href="https://chat.whatsapp.com/ejemplo" target="_blank" class="wa-button">📱 UNIRSE AL CANAL WHATSAPP</a>
                <button class="close-modal" style="margin-top:20px;">CERRAR</button>
            </div>`;
            document.body.appendChild(modal);
            modal.classList.add('active');
            
            const guardarBtn = modal.querySelector('#guardarNombreBtn');
            const nombreInput = modal.querySelector('#nombreParticipante');
            const feedback = modal.querySelector('#feedbackNombre');
            
            guardarBtn.addEventListener('click', () => {
                const nombre = nombreInput.value.trim();
                if(nombre === "") {
                    feedback.innerText = "⚠️ Escribí un nombre, aunque sea un apodo.";
                    return;
                }
                // almacenar en localStorage (listado simple)
                let stored = localStorage.getItem("cuestion_participantes");
                let participantes = stored ? JSON.parse(stored) : [];
                participantes.push({nombre: nombre, fecha: new Date().toISOString()});
                localStorage.setItem("cuestion_participantes", JSON.stringify(participantes));
                feedback.innerHTML = "✅ ¡Guardado! Nos vemos en LA CUESTIÓN.";
                nombreInput.disabled = true;
                guardarBtn.disabled = true;
                playBeep(660, 0.2);
            });
            
            const closeModalBtn = modal.querySelector('.close-modal');
            closeModalBtn.addEventListener('click', () => modal.remove());
        }

        // asignar eventos a cada opción
        optionCards.forEach(card => {
            card.addEventListener('click', (e) => {
                const option = card.getAttribute('data-option');
                if(option === 'timeplace') {
                    showTimePlaceModal();
                } else if(option === 'pista') {
                    showPistaModal();
                } else if(option === 'inscripcion') {
                    showInscripcionModal();
                }
            });
        });

        // Pequeño fix: Asegurar que el contexto de audio se active con primer click global (por políticas de navegador)
        document.body.addEventListener('click', () => {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });
    })();
</script>
</body>
</html>
