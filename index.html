<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA CUESTIÓN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: sans-serif; transition: background-color 0.6s ease; background-color: #e8e4da; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        .switch-btn { transition: transform 0.4s ease; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="p1" class="fixed inset-0 flex flex-col items-center justify-center z-50">
        <div class="w-40 h-60 bg-[#dcd7cb] border-4 border-[#b5afa2] rounded-[2rem] flex items-center justify-center relative shadow-xl">
            <div class="w-16 h-36 bg-[#b5afa2] rounded-full flex flex-col items-center p-2 relative shadow-inner">
                <button id="sw" class="w-12 h-16 bg-white rounded-xl switch-btn absolute top-2 cursor-pointer border-b-4 border-gray-300"></button>
            </div>
        </div>
        <p class="mt-8 font-bold uppercase tracking-widest text-[10px] text-gray-600 animate-pulse">Apagá la luz para entrar</p>
    </div>

    <div id="p2" class="hidden min-h-screen p-6 flex flex-col items-center bg-[#fcfaf7]">
        <div class="w-full max-w-md pt-10">
            <header class="mb-10">
                <span class="bg-black text-white px-3 py-1 font-black text-2xl">LA</span>
                <h1 class="text-6xl font-black tracking-tighter mt-2">CUESTIÓN.</h1>
            </header>

            <div class="space-y-6">
                <div class="bg-white p-8 shadow-lg border-l-8 border-black transform -rotate-1">
                    <p class="text-yellow-600 font-bold text-xs uppercase tracking-widest mb-1">Confirmado</p>
                    <h2 class="text-4xl font-black">09 MAYO</h2>
                    <p class="text-gray-400 font-bold italic">20:00 HS - MENDOZA</p>
                </div>

                <div class="bg-gray-900 text-white p-8 rounded shadow-2xl space-y-4">
                    <div class="flex items-center gap-2 text-yellow-400 font-bold text-xs uppercase">
                        <i data-lucide="ticket"></i> Pase de Invitado
                    </div>
                    <div class="bg-white/10 p-4 border border-white/10">
                        <p class="text-3xl font-black text-yellow-400">$4.000</p>
                        <div class="mt-4 flex justify-between items-center bg-black/50 p-3 rounded">
                            <span class="text-xs font-mono">ellorenzopa.banda</span>
                            <button onclick="copy()" class="text-yellow-400 hover:text-white"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <a href="https://wa.me/5492610000000" class="block w-full bg-yellow-400 text-black py-4 text-center font-black uppercase text-sm shadow-lg hover:bg-yellow-300">
                        Confirmar Asistencia
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const sw = document.getElementById('sw');
        sw.onclick = () => {
            sw.style.transform = 'translateY(80px)';
            document.body.style.backgroundColor = 'black';
            setTimeout(() => {
                document.getElementById('p1').classList.add('hidden');
                document.getElementById('p2').classList.remove('hidden');
                document.body.style.backgroundColor = '#fcfaf7';
                lucide.createIcons();
            }, 600);
        };

        function copy() {
            navigator.clipboard.writeText('ellorenzopa.banda');
            alert('¡Alias copiado!');
        }
    </script>
</body>
</html>
