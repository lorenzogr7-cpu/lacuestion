<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA CUESTIÓN — 09.05</title>
<script src="https://www.google.com/search?q=https://cdn.tailwindcss.com"></script>
<script src="https://www.google.com/search?q=https://unpkg.com/lucide%40latest"></script>
<style>
@import url('https://www.google.com/search?q=https://fonts.googleapis.com/css2%3Ffamily%3DInter:wght%40400%3B700%3B900%26display%3Dswap');

    body { 
        font-family: 'Inter', sans-serif; 
        transition: background-color 0.8s ease; 
        background-color: #e8e4da; 
        margin: 0; 
        overflow-x: hidden; 
    }
    
    .hidden { display: none !important; }
    
    .switch-handle { 
        transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); 
        box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
    }
    
    .animate-fade-in {
        animation: fadeIn 1.2s ease-out forwards;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>


</head>
<body>

<!-- VISTA 1: INTERRUPTOR -->
<div id="view-power" class="fixed inset-0 flex flex-col items-center justify-center p-6 z-50">
    <div class="flex flex-col items-center gap-10">
        <div class="w-44 h-64 bg-[#dcd7cb] border-4 border-[#b5afa2] rounded-[3rem] flex items-center justify-center relative shadow-2xl">
            <div class="w-20 h-40 bg-[#b5afa2] rounded-full flex flex-col items-center p-2 relative shadow-inner">
                <button id="btn-switch" class="w-14 h-20 bg-white rounded-2xl switch-handle absolute top-2 cursor-pointer border-b-4 border-slate-200"></button>
            </div>
        </div>
        <p id="hint" class="font-black uppercase tracking-[0.3em] text-[10px] text-slate-800 animate-pulse text-center">
            Apagá la luz para entrar
        </p>
    </div>
</div>

<!-- VISTA 2: INVITACIÓN -->
<div id="view-main" class="hidden min-h-screen p-6 flex flex-col items-center">
    <div class="w-full max-w-md pt-12">
        <header class="mb-12">
            <div class="inline-block bg-black text-white font-black text-3xl px-3 py-1 mb-2 uppercase">La</div>
            <h1 class="text-7xl font-black tracking-tighter leading-none text-slate-900 uppercase">Cuestión.</h1>
        </header>

        <main class="space-y-6">
            <!-- Tarjeta de Fecha -->
            <section class="bg-white border-l-[10px] border-black p-8 shadow-xl transform -rotate-1">
                <p class="text-[10px] font-black uppercase tracking-widest text-yellow-600 mb-1">Confirmado</p>
                <h2 class="text-4xl font-black">09 MAYO</h2>
                <p class="text-lg font-bold opacity-40">20:00 HORAS - MENDOZA</p>
            </section>

            <!-- Tarjeta de Ticket/Pago -->
            <section class="bg-slate-900 text-white p-8 rounded-sm shadow-2xl space-y-6">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="ticket" class="text-yellow-400"></i>
                    <span class="font-black uppercase text-xs tracking-widest">Pase de Invitado</span>
                </div>
                
                <div class="bg-white/5 border border-white/10 p-5">
                    <p class="text-[9px] opacity-40 uppercase font-black mb-1">Colaboración</p>
                    <p class="text-3xl font-black text-yellow-400 mb-4">$4.000</p>
                    
                    <div class="flex justify-between items-center bg-black/40 p-3 border border-white/5 relative">
                        <span class="font-mono text-xs">ellorenzopa.banda</span>
                        <button id="btn-copy" class="text-yellow-400 p-2 hover:text-white transition-colors">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <p id="copy-msg" class="text-green-400 text-[10px] font-bold uppercase mt-2 hidden text-center">¡Alias copiado!</p>
                </div>

                <!-- Botón de WhatsApp -->
                <a href="https://wa.me/5492610000000?text=Hola!%20Confirmo%20mi%20asistencia%20a%20La%20Cuestión" target="_blank" class="block w-full bg-yellow-400 text-black py-4 text-center font-black uppercase text-sm tracking-widest shadow-lg active:scale-95 transition-transform hover:bg-yellow-300">
                    Confirmar Asistencia
                </a>
            </section>
        </main>

        <footer class="mt-20 pb-10 opacity-20 text-[8px] tracking-[1.5em] font-black uppercase text-center">
            Mendoza — 2026
        </footer>
    </div>
</div>

<script>
    // Inicializar iconos
    lucide.createIcons();
    
    // Elementos
    const btnSwitch = document.getElementById('btn-switch');
    const viewPower = document.getElementById('view-power');
    const viewMain = document.getElementById('view-main');
    const btnCopy = document.getElementById('btn-copy');
    const copyMsg = document.getElementById('copy-msg');
    
    // Lógica del interruptor
    btnSwitch.addEventListener('click', () => {
        btnSwitch.style.transform = 'translateY(110px)';
        document.body.style.backgroundColor = 'black';
        
        setTimeout(() => {
            viewPower.classList.add('hidden');
            viewMain.classList.remove('hidden');
            document.body.style.backgroundColor = '#fcfaf7';
            lucide.createIcons();
        }, 700);
    });

    // Lógica de copiar alias
    btnCopy.addEventListener('click', () => {
        const alias = 'ellorenzopa.banda';
        const el = document.createElement('textarea');
        el.value = alias;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        // Mostrar mensaje de éxito temporalmente
        copyMsg.classList.remove('hidden');
        setTimeout(() => {
            copyMsg.classList.add('hidden');
        }, 2000);
    });
</script>


</body>
</html>
